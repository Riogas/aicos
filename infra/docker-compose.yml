# AICOS — Stack base (R2a + R2b + R3)
# Levanta Postgres + Redis + Qdrant + Paperclip + Quota Manager.
# Uso: cd ~/aicos && docker compose -f infra/docker-compose.yml up -d
#
# Acceso desde la red Docker:  postgres / redis / qdrant / paperclip / aicos-quota-manager
# Acceso desde el host (WSL):  localhost:5432 / :6379 / :6333 / :3100 / :7001

services:
  postgres:
    image: postgres:16-alpine
    container_name: aicos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_EXTRA_DBS: ${POSTGRES_EXTRA_DBS}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: aicos-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: aicos-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # Embeddings locales (claude-only, sin APIs externas) para la memoria L4.
  # text-embeddings-inference (CPU) sirviendo un modelo multilingüe de 384 dims.
  # El bridge le pega en /embed (ver AICOS_EMBEDDINGS_URL). Descarga el modelo al
  # primer arranque (necesita internet esa vez).
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    container_name: aicos-embeddings
    restart: unless-stopped
    command: ["--model-id", "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"]
    environment:
      HF_HOME: /data
    volumes:
      - embeddings-data:/data
    ports:
      - "7080:80"

  paperclip:
    build:
      context: ../vendor/paperclip
      dockerfile: Dockerfile
      args:
        USER_UID: "1000"
        USER_GID: "1000"
    image: aicos/paperclip:local
    container_name: aicos-paperclip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Para que Paperclip pueda llamar al bridge en el host (aicos-bridge --serve
    # corre en :7100 del host).
    # WSL+Docker quirk: `host-gateway` se mapea a la interfaz wrong (172.16.x.x WSL/Windows)
    # en vez del gateway del network. La red `default` de este compose tiene
    # subnet/gateway FIJOS (ver bloque networks: al final) así esta IP nunca
    # se desincroniza cuando Docker recrea la red.
    extra_hosts:
      - "host.docker.internal:${AICOS_DOCKER_GATEWAY:-172.28.0.1}"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/paperclip
      PORT: "3100"
      HOST: 0.0.0.0
      SERVE_UI: "true"
      BETTER_AUTH_SECRET: ${PAPERCLIP_AUTH_SECRET}
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_CONFIG: /paperclip/instances/default/config.json
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      # AICOS guarda la API key de cada agente inline en el adapter `process`
      # (env AICOS_API_KEY). El modo `authenticated` activa por defecto el
      # strict secret mode, que rechaza secretos sensibles en texto plano y
      # exige secret-refs — incompatible con el onboarding de AICOS. Como es un
      # box self-hosted single-tenant (las keys ya viven en .secrets/ en claro),
      # lo desactivamos para permitir el adapter process.
      PAPERCLIP_SECRETS_STRICT_MODE: "false"
      # Hostnames permitidos para acceder a la UI (modo private). El installer
      # escribe AICOS_ALLOWED_HOSTNAMES en infra/.env con localhost + todas las
      # IPs del host (así una VM accedida por su IP privada no queda bloqueada).
      PAPERCLIP_ALLOWED_HOSTNAMES: ${AICOS_ALLOWED_HOSTNAMES:-localhost,127.0.0.1}
      # AICOS R5 patch: allow agents of the same company to comment/patch each
      # other's issues. Multi-tenant cross-company stays blocked.
      PAPERCLIP_ALLOW_INTRA_COMPANY_AGENT_MUTATIONS: "true"
      # AICOS recovery-action bypass: agent IDs listed here can resolve recovery
      # actions stamped by the watchdog for ANY owner. Used by the bridge so
      # updateStatus() doesn't get 403'd after every run that hits the watchdog.
      # Comma-separated UUIDs. The first one MUST be the Hermes/CEO agent
      # whose key the bridge uses for its system-level mutations.
      PAPERCLIP_SYSTEM_AGENT_IDS: ${PAPERCLIP_SYSTEM_AGENT_IDS:-${AICOS_HERMES_AGENT_ID:-}}
    volumes:
      - paperclip-data:/paperclip
      # AICOS Path A: mount the host's home at the SAME path inside the
      # container so workspace cwd values (which are host-absolute, e.g.
      # ~/Projects/riogas-pwa) resolve identically when the process adapter
      # spawns the bridge. Node 24 is already inside this image so the
      # bridge JS runs natively without extra runtime install.
      # AICOS_HOST_HOME lo escribe el installer en infra/.env.
      - ${AICOS_HOST_HOME:-/home/jgomez}:${AICOS_HOST_HOME:-/home/jgomez}:rw
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3100/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  aicos-quota-manager:
    build:
      context: ..
      dockerfile: services/aicos-quota-manager/Dockerfile
    image: aicos/quota-manager:local
    container_name: aicos-quota-manager
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:${AICOS_DOCKER_GATEWAY:-172.28.0.1}"
    environment:
      REDIS_URL: redis://host.docker.internal:6379
      QUOTA_PORT: "7001"
      QUOTA_ENABLED: "true"
      LOG_LEVEL: info
      # L7 smart routing: cuando learning esta disponible, /select re-rankea
      # candidates por score historico antes de aplicar availability.
      SMART_ROUTING: "true"
      LEARNING_SERVICE_URL: http://host.docker.internal:7003
      # Budgets LOCALES (guardrail). Subidos muy alto en infra/quota-budgets.json
      # para no rutear fuera de claude por un falso "sin quota".
      QUOTA_BUDGETS_FILE: /etc/aicos/budgets.json
    volumes:
      - ./quota-budgets.json:/etc/aicos/budgets.json:ro
    ports:
      - "7001:7001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  aicos-policy-engine:
    build:
      context: ..
      dockerfile: services/aicos-policy-engine/Dockerfile
    image: aicos/policy-engine:local
    container_name: aicos-policy-engine
    restart: unless-stopped
    environment:
      POLICY_PORT: "7002"
      POLICY_ENABLED: "true"
      LOG_LEVEL: info
      # POLICY_RULES_FILE: /etc/aicos/policy.json   # optional override
    ports:
      - "7002:7002"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7002/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  aicos-tool-gateway:
    build:
      context: ..
      dockerfile: services/aicos-tool-gateway/Dockerfile
    image: aicos/tool-gateway:local
    container_name: aicos-tool-gateway
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:${AICOS_DOCKER_GATEWAY:-172.28.0.1}"
    environment:
      REDIS_URL: redis://host.docker.internal:6379
      GATEWAY_PORT: "7004"
      GATEWAY_ENABLED: "true"
      POLICY_SERVICE_URL: http://host.docker.internal:7002
      LOG_LEVEL: info
      # GITHUB_TOKEN: from .env (optional, enables real POSTs to github)
    ports:
      - "7004:7004"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7004/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  aicos-learning:
    build:
      context: ..
      dockerfile: services/aicos-learning/Dockerfile
    image: aicos/learning:local
    container_name: aicos-learning
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:${AICOS_DOCKER_GATEWAY:-172.28.0.1}"
    environment:
      REDIS_URL: redis://host.docker.internal:6379
      LEARNING_PORT: "7003"
      LEARNING_ENABLED: "true"
      LOG_LEVEL: info
    ports:
      - "7003:7003"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7003/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  aicos-dashboard:
    build:
      context: ..
      dockerfile: apps/dashboard/Dockerfile
    image: aicos/dashboard:local
    container_name: aicos-dashboard
    restart: unless-stopped
    depends_on:
      - aicos-quota-manager
      - aicos-policy-engine
      - aicos-learning
    environment:
      # Dentro de la red infra_default los servicios se resuelven por DNS;
      # el bridge corre en el HOST (no en docker) → host.docker.internal.
      # NOTA WSL2: la red bridge container-a-container esta rota, asi que
      # ruteamos TODO por host.docker.internal (gateway 172.28.0.1) que llega
      # a los puertos mapeados en el host.
      QUOTA_SERVICE_URL: http://host.docker.internal:7001
      POLICY_SERVICE_URL: http://host.docker.internal:7002
      LEARNING_SERVICE_URL: http://host.docker.internal:7003
      GATEWAY_SERVICE_URL: http://host.docker.internal:7004
      BRIDGE_SERVICE_URL: http://host.docker.internal:7100
      # /api/flow-state asks Paperclip directly for in_progress issues so the
      # multi-agent tree + concurrent worker view reflects what's really happening
      # (the bridge's HTTP-only in-flight tracker misses runs spawned via the
      # process adapter).
      PAPERCLIP_API_URL: http://host.docker.internal:3100
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY}
      AICOS_COMPANY_ID: ${AICOS_COMPANY_ID}
      AICOS_HERMES_AGENT_ID: ${AICOS_HERMES_AGENT_ID}
    extra_hosts:
      - "host.docker.internal:${AICOS_DOCKER_GATEWAY:-172.28.0.1}"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/ | head -c 50 | grep -q AICOS || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Optional reverse proxy + TLS. Disabled by default — enable with
  # `docker compose --profile proxy up`. Picks the hostname from env
  # AICOS_HOSTNAME (set to your domain for LE, or "localhost" for internal
  # self-signed CA).
  caddy:
    image: caddy:2-alpine
    container_name: aicos-caddy
    profiles: ["proxy"]
    restart: unless-stopped
    environment:
      AICOS_HOSTNAME: ${AICOS_HOSTNAME:-localhost}
      AICOS_TLS_EMAIL: ${AICOS_TLS_EMAIL:-admin@example.com}
    extra_hosts:
      - "host.docker.internal:${AICOS_DOCKER_GATEWAY:-172.28.0.1}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    depends_on:
      - aicos-dashboard
      - aicos-quota-manager
      - aicos-policy-engine
      - aicos-learning
      - aicos-tool-gateway

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  embeddings-data:
  paperclip-data:
  caddy-data:
  caddy-config:

# Subnet/gateway FIJOS para que host.docker.internal (extra_hosts arriba)
# nunca quede apuntando a una IP vieja cuando Docker recrea la red.
# Si 172.28.0.0/16 colisiona en tu LAN, override con AICOS_DOCKER_SUBNET /
# AICOS_DOCKER_GATEWAY en infra/.env.
networks:
  default:
    ipam:
      config:
        - subnet: ${AICOS_DOCKER_SUBNET:-172.28.0.0/16}
          gateway: ${AICOS_DOCKER_GATEWAY:-172.28.0.1}
